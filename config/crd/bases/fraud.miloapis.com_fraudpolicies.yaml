---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: fraudpolicies.fraud.miloapis.com
spec:
  group: fraud.miloapis.com
  names:
    kind: FraudPolicy
    listKind: FraudPolicyList
    plural: fraudpolicies
    singular: fraudpolicy
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          FraudPolicy is the Schema for the fraudpolicies API.
          It defines the fraud evaluation pipeline including stages, thresholds,
          enforcement mode, and trigger configuration.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of FraudPolicy.
            properties:
              enforcement:
                description: enforcement controls how fraud evaluation results are
                  acted upon.
                properties:
                  mode:
                    description: |-
                      mode determines whether enforcement actions are automatically applied or
                      only observed (logged but not enforced).
                    enum:
                    - OBSERVE
                    - AUTO
                    type: string
                required:
                - mode
                type: object
              historyRetention:
                description: |-
                  historyRetention controls how many historical evaluation entries are
                  retained per FraudEvaluation resource.
                properties:
                  maxEntries:
                    default: 50
                    description: |-
                      maxEntries is the maximum number of evaluation history entries to retain
                      per FraudEvaluation resource.
                    minimum: 1
                    type: integer
                type: object
              stages:
                description: |-
                  stages defines the ordered evaluation pipeline. Each stage is executed in
                  sequence unless short-circuited by a previous stage.
                items:
                  description: Stage defines a single step in the fraud evaluation
                    pipeline.
                  properties:
                    name:
                      description: name is a human-readable identifier for this stage.
                      type: string
                    providers:
                      description: providers lists the fraud providers to invoke in
                        this stage.
                      items:
                        description: StageProvider identifies a provider to be invoked
                          within a pipeline stage.
                        properties:
                          providerRef:
                            description: providerRef references a FraudProvider resource
                              by name.
                            properties:
                              name:
                                description: name is the name of the FraudProvider
                                  resource.
                                type: string
                            required:
                            - name
                            type: object
                        required:
                        - providerRef
                        type: object
                      minItems: 1
                      type: array
                    required:
                      default: false
                      description: |-
                        required indicates whether this stage must always run, even if a previous
                        stage's short-circuit logic would otherwise skip it.
                      type: boolean
                    shortCircuit:
                      description: |-
                        shortCircuit configures short-circuit behavior for this stage. If the
                        maximum score in this stage is below the configured threshold, subsequent
                        non-required stages are skipped.
                      properties:
                        skipWhenBelow:
                          description: |-
                            skipWhenBelow causes subsequent non-required stages to be skipped if the
                            maximum score produced by this stage is below this value.
                          maximum: 100
                          minimum: 0
                          type: integer
                      required:
                      - skipWhenBelow
                      type: object
                    thresholds:
                      description: thresholds define score boundaries and their associated
                        actions for this stage.
                      items:
                        description: |-
                          Threshold defines a score boundary and the action to take when the score
                          meets or exceeds it.
                        properties:
                          action:
                            description: action is the enforcement action to take
                              when the score meets or exceeds minScore.
                            enum:
                            - REVIEW
                            - DEACTIVATE
                            type: string
                          minScore:
                            description: minScore is the minimum composite score (0-100)
                              that triggers this action.
                            maximum: 100
                            minimum: 0
                            type: integer
                        required:
                        - action
                        - minScore
                        type: object
                      minItems: 1
                      type: array
                  required:
                  - name
                  - providers
                  - thresholds
                  type: object
                minItems: 1
                type: array
              triggers:
                description: triggers defines what events or actions initiate a fraud
                  evaluation.
                items:
                  description: TriggerConfig defines what triggers a fraud evaluation.
                  properties:
                    event:
                      description: |-
                        event is the name of the event that triggers evaluation (e.g. "UserCreated").
                        Only applicable when type is "Event".
                      type: string
                    type:
                      description: type is the kind of trigger.
                      enum:
                      - Event
                      - Manual
                      type: string
                  required:
                  - type
                  type: object
                type: array
            required:
            - enforcement
            - stages
            type: object
          status:
            description: status defines the observed state of FraudPolicy.
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the FraudPolicy resource.

                  Standard condition types include:
                  - "Available": the policy is valid and all referenced providers are available
                  - "Degraded": one or more referenced providers are unavailable
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
