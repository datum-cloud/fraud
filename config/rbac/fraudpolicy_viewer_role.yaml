# This rule is not used by the project fraud-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to fraud.miloapis.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: fraud-operator
    app.kubernetes.io/managed-by: kustomize
  name: fraudpolicy-viewer-role
rules:
- apiGroups:
  - fraud.miloapis.com
  resources:
  - fraudpolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - fraud.miloapis.com
  resources:
  - fraudpolicies/status
  verbs:
  - get
